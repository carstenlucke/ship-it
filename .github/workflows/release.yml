name: Release mit Presentation-PDF

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Presentation-Abhängigkeiten installieren
        working-directory: presentation
        run: npm ci

      - name: Playwright-Browser installieren
        working-directory: presentation
        run: npx playwright install --with-deps chromium

      - name: PDF exportieren
        working-directory: presentation
        run: npm run export

      - name: Release erstellen und PDF hochladen
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: presentation/schnuppervorlesung-ki.pdf
