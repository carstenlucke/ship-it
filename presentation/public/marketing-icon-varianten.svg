<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#2A3840"/>

  <!-- Variante 1: Klassisches Megaphon (FontAwesome-Stil) -->
  <rect x="20" y="20" width="170" height="120" rx="10" fill="#1E2D35" stroke="#80BA24" stroke-width="1.5"/>
  <text x="105" y="155" font-family="system-ui" font-size="11" fill="#8FA0AA" text-anchor="middle">1: Megaphon klassisch</text>
  <g transform="translate(55, 45)" fill="#80BA24" stroke="none">
    <path d="M 40 5 L 40 45 L 18 37 L 18 13 Z"/>
    <rect x="10" y="16" width="10" height="18" rx="5"/>
    <path d="M 18 37 L 15 52 L 23 52 L 21 37 Z"/>
  </g>

  <!-- Variante 2: Megaphon mit Schallwellen -->
  <rect x="210" y="20" width="170" height="120" rx="10" fill="#1E2D35" stroke="#80BA24" stroke-width="1.5"/>
  <text x="295" y="155" font-family="system-ui" font-size="11" fill="#8FA0AA" text-anchor="middle">2: Megaphon + Wellen</text>
  <g transform="translate(245, 45)" fill="#80BA24" stroke="none">
    <path d="M 35 5 L 35 45 L 15 37 L 15 13 Z"/>
    <rect x="8" y="16" width="9" height="18" rx="4.5"/>
    <path d="M 15 37 L 13 50 L 20 50 L 18 37 Z"/>
    <path d="M 39 12 Q 47 25 39 38" fill="none" stroke="#80BA24" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 44 7 Q 55 25 44 43" fill="none" stroke="#80BA24" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Variante 3: Bullhorn seitlich -->
  <rect x="400" y="20" width="170" height="120" rx="10" fill="#1E2D35" stroke="#80BA24" stroke-width="1.5"/>
  <text x="485" y="155" font-family="system-ui" font-size="11" fill="#8FA0AA" text-anchor="middle">3: Bullhorn breit</text>
  <g transform="translate(435, 40)" fill="#80BA24" stroke="none">
    <path d="M 12 10 L 50 0 L 50 50 L 12 40 Z"/>
    <ellipse cx="11" cy="25" rx="6" ry="12"/>
    <path d="M 14 40 L 10 55 L 20 55 L 18 40 Z"/>
  </g>

  <!-- Variante 4: Einfaches Dreieck-Megaphon -->
  <rect x="590" y="20" width="170" height="120" rx="10" fill="#1E2D35" stroke="#80BA24" stroke-width="1.5"/>
  <text x="675" y="155" font-family="system-ui" font-size="11" fill="#8FA0AA" text-anchor="middle">4: Minimal-Megaphon</text>
  <g transform="translate(630, 42)" fill="#80BA24" stroke="none">
    <path d="M 0 15 L 15 15 L 40 2 L 40 48 L 15 35 L 0 35 Q -4 35 -4 25 Q -4 15 0 15 Z"/>
    <path d="M 8 35 L 5 50 L 15 50 L 13 35 Z"/>
  </g>

  <!-- Variante 5: Megaphon outline -->
  <rect x="780" y="20" width="170" height="120" rx="10" fill="#1E2D35" stroke="#80BA24" stroke-width="1.5"/>
  <text x="865" y="155" font-family="system-ui" font-size="11" fill="#8FA0AA" text-anchor="middle">5: Outline-Megaphon</text>
  <g transform="translate(820, 42)" fill="none" stroke="#80BA24" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 5 15 L 15 15 L 38 3 L 38 47 L 15 35 L 5 35 Q 1 35 1 25 Q 1 15 5 15 Z"/>
    <path d="M 10 35 L 8 48 L 16 48 L 14 35" fill="#80BA24"/>
  </g>

  <!-- Variante 6: Rakete (Marketing-Launch) -->
  <rect x="20" y="190" width="170" height="120" rx="10" fill="#1E2D35" stroke="#80BA24" stroke-width="1.5"/>
  <text x="105" y="325" font-family="system-ui" font-size="11" fill="#8FA0AA" text-anchor="middle">6: Rakete (Launch)</text>
  <g transform="translate(60, 210)" fill="#80BA24" stroke="none">
    <path d="M 25 0 Q 25 15 20 30 L 30 30 Q 25 15 25 0 Z"/>
    <path d="M 15 20 L 10 30 L 20 28 Z"/>
    <path d="M 35 20 L 40 30 L 30 28 Z"/>
    <rect x="20" y="30" width="10" height="8" rx="2"/>
    <path d="M 22 38 L 21 48 L 25 45 L 29 48 L 28 38 Z" fill="#80BA24" opacity="0.6"/>
  </g>

  <!-- Variante 7: Stern/Sparkle (Kampagne) -->
  <rect x="210" y="190" width="170" height="120" rx="10" fill="#1E2D35" stroke="#80BA24" stroke-width="1.5"/>
  <text x="295" y="325" font-family="system-ui" font-size="11" fill="#8FA0AA" text-anchor="middle">7: Stern (Kampagne)</text>
  <g transform="translate(270, 215)" fill="#80BA24" stroke="none">
    <path d="M 25 0 L 30 18 L 50 18 L 34 28 L 40 47 L 25 35 L 10 47 L 16 28 L 0 18 L 20 18 Z"/>
  </g>

  <!-- Variante 8: Sprechblase mit Ausrufezeichen -->
  <rect x="400" y="190" width="170" height="120" rx="10" fill="#1E2D35" stroke="#80BA24" stroke-width="1.5"/>
  <text x="485" y="325" font-family="system-ui" font-size="11" fill="#8FA0AA" text-anchor="middle">8: Sprechblase</text>
  <g transform="translate(450, 210)" fill="#80BA24" stroke="none">
    <rect x="0" y="0" width="42" height="35" rx="8"/>
    <path d="M 10 35 L 15 48 L 22 35 Z"/>
    <rect x="18" y="8" width="5" height="14" rx="2.5" fill="#2A3840"/>
    <circle cx="20.5" cy="27" r="2.5" fill="#2A3840"/>
  </g>

  <!-- Variante 9: Zielscheibe/Target -->
  <rect x="590" y="190" width="170" height="120" rx="10" fill="#1E2D35" stroke="#80BA24" stroke-width="1.5"/>
  <text x="675" y="325" font-family="system-ui" font-size="11" fill="#8FA0AA" text-anchor="middle">9: Zielscheibe</text>
  <g transform="translate(650, 220)" fill="none" stroke="#80BA24" stroke-width="3">
    <circle cx="25" cy="22" r="22"/>
    <circle cx="25" cy="22" r="14"/>
    <circle cx="25" cy="22" r="6" fill="#80BA24"/>
  </g>

  <!-- Variante 10: Flagge/Banner -->
  <rect x="780" y="190" width="170" height="120" rx="10" fill="#1E2D35" stroke="#80BA24" stroke-width="1.5"/>
  <text x="865" y="325" font-family="system-ui" font-size="11" fill="#8FA0AA" text-anchor="middle">10: Flagge</text>
  <g transform="translate(830, 210)" fill="#80BA24" stroke="none">
    <rect x="5" y="0" width="4" height="50" rx="2"/>
    <path d="M 9 3 L 45 3 L 38 16 L 45 29 L 9 29 Z"/>
  </g>

</svg>
